<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EduTrack | Assignments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body style="background-color: #f8fafc;">

    <div th:replace="~{student/fragments :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{student/fragments :: sidebar(activeMenu='assignments')}"></div>

            <main class="col-md-10 py-4 px-4">
                <h1 class="h3 fw-bold mb-4">My Assignments</h1>

                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                    <tr>
                                        <th class="ps-4">Title & Description</th>
                                        <th>Deadline</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="a : ${assignments}">
                                        <td class="ps-4">
                                            <div class="fw-bold text-dark" th:text="${a.title}">Title</div>
                                            <small class="text-muted d-block" th:text="${a.description}">Desc</small>
                                        </td>
                                        <td>
                                            <span class="text-danger fw-bold" th:text="${a.deadline}"><i class="bi bi-clock me-1"></i></span>
                                        </td>
                                        <td>
                                            <a th:if="${a.fileBase64 != null}" th:href="${a.fileBase64}" download class="btn btn-sm btn-outline-secondary me-2"><i class="bi bi-download"></i> Download</a>
                                            <button class="btn btn-sm btn-primary">Submit Work</button>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(assignments)}">
                                        <td colspan="3" class="text-center py-5 text-muted">No assignments pending.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
