<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EduTrack | Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f0f2f5; }
        .card-stats { border-left: 5px solid #1a237e; border-radius: 10px; }
        .card-summary-students { border-left-color: #0d6efd; }
        .card-summary-batches { border-left-color: #6610f2; }
        .card-summary-collected { border-left-color: #198754; }
        .card-summary-pending { border-left-color: #dc3545; }
        th { background-color: #f8f9fa !important; color: #1a237e; }
    </style>
</head>
<body>

    <div th:replace="~{admin/fragments :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{admin/fragments :: sidebar(activeMenu='dashboard')}"></div>

            <!-- Main Content -->
            <main class="col-md-10 py-4 px-4">
                <h1 class="h3 mb-4 fw-bold">Executive Overview</h1>

                <!-- Summary Cards -->
                <div class="row g-4 mb-5">
                    <div class="col-md-3">
                        <div class="card card-stats card-summary-students shadow-sm p-3 h-100">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <p class="text-muted mb-0 small text-uppercase">Total Students</p>
                                    <h2 class="fw-bold mb-0" th:text="${totalStudents}">0</h2>
                                </div>
                                <i class="bi bi-people text-primary fs-1 opacity-50"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card card-stats card-summary-batches shadow-sm p-3 h-100">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <p class="text-muted mb-0 small text-uppercase">Total Batches</p>
                                    <h2 class="fw-bold mb-0" th:text="${totalBatches}">0</h2>
                                </div>
                                <i class="bi bi-journal-check text-info fs-1 opacity-50"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card card-stats card-summary-collected shadow-sm p-3 h-100">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <p class="text-muted mb-0 small text-uppercase">Fees Collected</p>
                                    <h2 class="fw-bold mb-0 text-success" th:text="${'₹' + collectedFees}">₹0</h2>
                                </div>
                                <i class="bi bi-cash-stack text-success fs-1 opacity-50"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card card-stats card-summary-pending shadow-sm p-3 h-100">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <p class="text-muted mb-0 small text-uppercase">Pending Fees</p>
                                    <h2 class="fw-bold mb-0 text-danger" th:text="${'₹' + pendingFees}">₹0</h2>
                                </div>
                                <i class="bi bi-exclamation-triangle text-danger fs-1 opacity-50"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Recent Students List -->
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-header bg-white py-3 border-bottom-0">
                        <div class="d-flex justify-content-between align-items-center">
                            <h5 class="mb-0 fw-bold">Recent Registrations</h5>
                            <a href="/admin/manage" class="btn btn-sm btn-primary">View All</a>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead>
                                    <tr>
                                        <th class="ps-4">Name</th>
                                        <th>Email</th>
                                        <th>Batch</th>
                                        <th>Paid</th>
                                        <th class="pe-4">Remaining</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="student : ${students}">
                                        <td class="ps-4 fw-medium" th:text="${student.name}">Name</td>
                                        <td th:text="${student.email}">Email</td>
                                        <td><span class="badge bg-light text-dark border" th:text="${student.batch}">Batch</span></td>
                                        <td class="text-success fw-bold" th:text="${'₹' + student.feesPaid}">₹0</td>
                                        <td class="pe-4 text-danger fw-bold" th:text="${'₹' + student.feesRemaining}">₹0</td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(students)}">
                                        <td colspan="5" class="text-center py-5 text-muted">No student records found.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
