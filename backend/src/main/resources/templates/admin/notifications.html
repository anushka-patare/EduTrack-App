<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EduTrack | Notifications Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body style="background-color: #f0f2f5;">

    <div th:replace="~{admin/fragments :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{admin/fragments :: sidebar(activeMenu='notifications')}"></div>

            <main class="col-md-10 py-4 px-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="h3 fw-bold mb-0 text-dark">Recent Notifications</h1>
                    <button class="btn btn-danger shadow-sm" data-bs-toggle="modal" data-bs-target="#addNotificationModal">
                        <i class="bi bi-megaphone me-2"></i>Send New Notification
                    </button>
                </div>

                <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                    <tr>
                                        <th class="ps-4">Date & Time</th>
                                        <th>Content</th>
                                        <th>Target</th>
                                        <th class="text-center">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="n : ${notifications}">
                                        <td class="ps-4 text-muted small" th:text="${n.date}">Date</td>
                                        <td>
                                            <div class="fw-bold text-dark" th:text="${n.title}">Title</div>
                                            <div class="small" th:text="${n.message}">Message</div>
                                        </td>
                                        <td>
                                            <span class="badge rounded-pill px-3" 
                                                  th:classappend="${n.targetBatch == 'ALL' ? 'bg-dark' : 'bg-info text-dark'}" 
                                                  th:text="${n.targetBatch}">Target</span>
                                        </td>
                                        <td class="text-center">
                                            <a class="btn btn-sm btn-outline-danger border-0" th:href="@{/admin/notification/delete/{id}(id=${n.id})}" onclick="return confirm('Delete this notification?')">
                                                <i class="bi bi-trash"></i>
                                            </a>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(notifications)}">
                                        <td colspan="4" class="text-center py-5 text-muted">No notifications sent yet.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Create Notification Modal -->
                <div class="modal fade" id="addNotificationModal" tabindex="-1">
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content border-0 rounded-4 shadow">
                            <div class="modal-header border-0 pb-0">
                                <h5 class="fw-bold">Send Notification</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <form th:action="@{/admin/notification/add}" method="post" th:object="${newNotification}">
                                <div class="modal-body">
                                    <div class="mb-3">
                                        <label class="form-label small fw-bold">Notification Title</label>
                                        <input type="text" th:field="*{title}" class="form-control" placeholder="e.g. Holiday Announcement" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label small fw-bold">Message Content</label>
                                        <textarea th:field="*{message}" class="form-control" rows="4" placeholder="Type your message here..." required></textarea>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label small fw-bold">Target Batch</label>
                                        <select th:field="*{targetBatch}" class="form-select" required>
                                            <option value="ALL">All Batches</option>
                                            <option th:each="b : ${batches}" th:value="${b.name}" th:text="${b.name}"></option>
                                        </select>
                                    </div>
                                </div>
                                <div class="modal-footer border-0">
                                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                                    <button type="submit" class="btn btn-danger rounded-pill px-4">Send Now</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
