<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EduTrack | Online Courses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body style="background-color: #f8fafc;">

    <div th:replace="~{student/fragments :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{student/fragments :: sidebar(activeMenu='online-courses')}"></div>

            <main class="col-md-10 py-4 px-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="h3 fw-bold mb-0">Explore Online Courses</h1>
                    <span class="badge bg-primary rounded-pill px-3 py-2" th:text="${courses.size() + ' Courses Available'}">0 Courses</span>
                </div>

                <div class="row g-4">
                    <div class="col-md-6 col-xl-4" th:each="course : ${courses}">
                        <div class="card border-0 shadow-sm h-100 rounded-4 overflow-hidden">
                            <div class="card-body p-4">
                                <div class="d-flex justify-content-between align-items-start mb-3">
                                    <span class="badge bg-success-subtle text-success border border-success-subtle rounded-pill px-3" th:text="${course.duration}">6 Months</span>
                                    <h4 class="fw-bold text-dark mb-0" th:text="${'₹' + course.totalFees}">₹0</h4>
                                </div>
                                <h5 class="fw-bold mb-2 text-dark" th:text="${course.name}">Course Name</h5>
                                <p class="text-muted small mb-4" th:text="${course.description}">Course description goes here.</p>
                                
                                <div class="mb-4">
                                    <h6 class="fw-bold text-dark small mb-2">What you'll learn:</h6>
                                    <div class="d-flex flex-wrap gap-1">
                                        <span class="badge bg-light text-dark border small fw-normal" th:each="item : ${#strings.arraySplit(course.syllabus, '\n')}" th:text="${item}" th:if="${item != null && !item.isEmpty()}">Syllabus Item</span>
                                    </div>
                                </div>
                            </div>
                            <div class="card-footer bg-white p-4 border-0 pt-0">
                                <a th:if="${student.batch == course.name}" class="btn btn-secondary w-100 disabled rounded-pill">
                                    <i class="bi bi-check-circle-fill me-2"></i>Already Enrolled
                                </a>
                                <a th:unless="${student.batch == course.name}" th:href="@{/student/pay/{id}(id=${course.id})}" class="btn btn-primary w-100 rounded-pill fw-bold">
                                    <i class="bi bi-cart-plus me-2"></i>Buy & Enroll Now
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(courses)}" class="text-center py-5">
                    <i class="bi bi-search display-1 text-muted opacity-25"></i>
                    <h3 class="mt-3 text-muted">No courses available at the moment.</h3>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
