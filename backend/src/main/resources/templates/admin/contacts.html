<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EduTrack | Manage Inquiries</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body style="background-color: #f0f2f5;">

    <div th:replace="~{admin/fragments :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{admin/fragments :: sidebar(activeMenu='contacts')}"></div>

            <main class="col-md-10 py-4 px-4">
                <h1 class="h3 fw-bold mb-4">Manage Inquiries</h1>

                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                    <tr>
                                        <th class="ps-4">Date</th>
                                        <th>Name & Contact</th>
                                        <th>Subject</th>
                                        <th>Message</th>
                                        <th class="pe-4 text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="c : ${contacts}">
                                        <td class="ps-4 text-muted small" th:text="${#temporals.format(c.submittedAt, 'dd MMM yyyy HH:mm')}">Date</td>
                                        <td>
                                            <span class="fw-medium d-block" th:text="${c.fullName}">Name</span>
                                            <small class="text-muted d-block"><i class="bi bi-envelope me-1"></i>[[${c.email}]]</small>
                                            <small class="text-muted d-block"><i class="bi bi-telephone me-1"></i>[[${c.mobileNumber}]]</small>
                                        </td>
                                        <td class="fw-medium" th:text="${c.subject}">Subject</td>
                                        <td>
                                            <div style="max-width: 300px; max-height: 80px; overflow-y: auto;" th:text="${c.message}"></div>
                                        </td>
                                        <td class="pe-4 text-end">
                                            <a th:href="@{/admin/contact/delete/{id}(id=${c.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete this inquiry?')"><i class="bi bi-trash"></i></a>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(contacts)}">
                                        <td colspan="5" class="text-center py-5 text-muted">No inquiries found.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
