<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EduTrack | My Courses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body style="background-color: #f8fafc;">

    <div th:replace="~{student/fragments :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{student/fragments :: sidebar(activeMenu='courses')}"></div>

            <main class="col-md-10 py-4 px-4">
                <h1 class="h3 fw-bold mb-4">Enrolled Course & Study Materials</h1>

                <!-- Course Details -->
                <div class="card border-0 shadow-sm rounded-4 p-4 mb-4" th:if="${batch != null}">
                    <div class="row g-4 align-items-center">
                        <div class="col-md-8">
                            <h3 class="fw-bold text-primary mb-2" th:text="${batch.name}">Batch Name</h3>
                            <p class="text-muted mb-3" th:text="${batch.description}">Description</p>
                            <div class="d-flex gap-4">
                                <div><small class="text-muted fw-bold">DURATION</small><br><span th:text="${batch.duration}"></span></div>
                                <div><small class="text-muted fw-bold">START DATE</small><br><span th:text="${batch.startDate}"></span></div>
                            </div>
                        </div>
                        <div class="col-md-4 text-md-end">
                            <a href="#" class="btn btn-outline-primary rounded-pill px-4"><i class="bi bi-camera-video me-2"></i>Join Live Class</a>
                        </div>
                    </div>
                </div>

                <!-- Study Materials -->
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-header bg-white pt-4 px-4 border-0"><h5 class="fw-bold">Study Materials</h5></div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                    <tr>
                                        <th class="ps-4">Title & Description</th>
                                        <th>Type</th>
                                        <th>Upload Date</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="m : ${materials}">
                                        <td class="ps-4">
                                            <div class="fw-bold text-dark" th:text="${m.title}">Title</div>
                                            <small class="text-muted text-truncate d-inline-block" style="max-width:300px;" th:text="${m.description}">Desc</small>
                                        </td>
                                        <td><span class="badge bg-secondary" th:text="${m.fileType}">PDF</span></td>
                                        <td th:text="${m.uploadDate}">Date</td>
                                        <td>
                                            <a th:href="${m.fileBase64}" download class="btn btn-sm btn-outline-primary"><i class="bi bi-download me-1"></i>Download</a>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(materials)}">
                                        <td colspan="4" class="text-center py-5 text-muted">No materials available yet.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
