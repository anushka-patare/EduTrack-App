<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EduTrack | Student Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: white; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); overflow: hidden; width: 100%; max-width: 900px; }
        .login-left { background: linear-gradient(135deg, #4F46E5 0%, #0ea5e9 100%); color: white; padding: 50px; display: flex; flex-direction: column; justify-content: center; }
        .login-right { padding: 50px; }
        .form-control { border-radius: 10px; padding: 12px 20px; background: #f8fafc; border: 1px solid #e2e8f0; }
        .form-control:focus { box-shadow: none; border-color: #4F46E5; }
        .btn-primary { background: #4F46E5; border: none; border-radius: 10px; padding: 12px; font-weight: 600; width: 100%; }
        .btn-primary:hover { background: #4338ca; }
    </style>
</head>
<body>

<div class="container">
    <div class="login-card row mx-auto">
        <div class="col-md-5 login-left text-center d-none d-md-flex">
            <h2 class="fw-bold mb-4">Welcome Back!</h2>
            <p class="opacity-75">Sign in to your student portal to access your courses, materials, and track your progress.</p>
        </div>
        <div class="col-md-7 login-right">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-dark">Student Login</h3>
                <p class="text-muted">Enter your credentials to continue</p>
            </div>
            
            <div th:if="${error != null}" class="alert alert-danger" th:text="${error}"></div>
            <div th:if="${param.registered}" class="alert alert-success">Registration successful! Please login.</div>
            
            <form action="/student/login" method="post">
                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold">Email Address</label>
                    <input type="email" name="email" class="form-control" required placeholder="student@example.com">
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold">Password</label>
                    <input type="password" name="password" class="form-control" required placeholder="••••••••">
                </div>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label text-muted small" for="remember">Remember me</label>
                    </div>
                    <a href="#" class="text-decoration-none small" style="color: #4F46E5;">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary">Login to Portal</button>
                <div class="text-center mt-4">
                    <p class="text-muted small">Don't have an account? <a href="/student/register" class="fw-bold text-decoration-none" style="color: #4F46E5;">Register here</a></p>
                    <a href="/" class="text-muted text-decoration-none small"><i class="bi bi-arrow-left me-1"></i> Back to Home</a>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
