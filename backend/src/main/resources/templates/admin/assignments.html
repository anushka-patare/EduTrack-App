<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EduTrack | Assignments Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body style="background-color: #f0f2f5;">

    <div th:replace="~{admin/fragments :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{admin/fragments :: sidebar(activeMenu='assignments')}"></div>

            <main class="col-md-10 py-4 px-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="h3 fw-bold mb-0 text-dark">Assignments Management</h1>
                    <button class="btn btn-warning shadow-sm" data-bs-toggle="modal" data-bs-target="#addAssignmentModal">
                        <i class="bi bi-journal-plus me-2"></i>Create New Assignment
                    </button>
                </div>

                <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                    <tr>
                                        <th class="ps-4">Title</th>
                                        <th>Target Batch</th>
                                        <th>Due Date</th>
                                        <th class="text-center">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="a : ${assignments}">
                                        <td class="ps-4">
                                            <div class="fw-bold text-dark" th:text="${a.title}">Title</div>
                                            <small class="text-muted" th:text="${a.description}">Desc</small>
                                        </td>
                                        <td>
                                            <span class="badge bg-indigo-subtle text-primary border border-primary-subtle rounded-pill px-3" th:text="${a.batchName}">Batch</span>
                                        </td>
                                        <td>
                                            <div class="text-danger fw-bold small"><i class="bi bi-clock me-1"></i>[[${a.dueDate}]]</div>
                                        </td>
                                        <td class="text-center">
                                            <a class="btn btn-sm btn-outline-danger border-0" th:href="@{/admin/assignment/delete/{id}(id=${a.id})}" onclick="return confirm('Delete this assignment?')">
                                                <i class="bi bi-trash"></i>
                                            </a>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(assignments)}">
                                        <td colspan="4" class="text-center py-5 text-muted">No assignments created yet.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Create Assignment Modal -->
                <div class="modal fade" id="addAssignmentModal" tabindex="-1">
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content border-0 rounded-4 shadow">
                            <div class="modal-header border-0 pb-0">
                                <h5 class="fw-bold">Create New Assignment</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <form th:action="@{/admin/assignment/add}" method="post" th:object="${newAssignment}">
                                <div class="modal-body">
                                    <div class="mb-3">
                                        <label class="form-label small fw-bold">Assignment Title</label>
                                        <input type="text" th:field="*{title}" class="form-control" placeholder="e.g. React Todo App" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label small fw-bold">Description/Instructions</label>
                                        <textarea th:field="*{description}" class="form-control" rows="3" placeholder="Explain the tasks..."></textarea>
                                    </div>
                                    <div class="row g-3 mb-3">
                                        <div class="col-md-6">
                                            <label class="form-label small fw-bold">Target Batch</label>
                                            <select th:field="*{batchName}" class="form-select" required>
                                                <option th:each="b : ${batches}" th:value="${b.name}" th:text="${b.name}"></option>
                                            </select>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label small fw-bold">Due Date</label>
                                            <input type="date" th:field="*{dueDate}" class="form-control" required>
                                        </div>
                                    </div>
                                </div>
                                <div class="modal-footer border-0">
                                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                                    <button type="submit" class="btn btn-warning rounded-pill px-4">Post Assignment</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
