<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <nav th:fragment="sidebar" class="col-md-2 d-none d-md-block sidebar py-4 px-3" style="background: white; min-height: calc(100vh - 56px); box-shadow: 2px 0 5px rgba(0,0,0,0.05);">
        <style>
            .nav-link { color: #475569; font-weight: 500; border-radius: 8px; margin-bottom: 5px; transition: all 0.2s; }
            .nav-link:hover, .nav-link.active { background: #e0e7ff; color: #4F46E5; }
        </style>
        <div class="text-center mb-4">
            <img th:src="${session.loggedInStudent.profilePhotoBase64 != null ? session.loggedInStudent.profilePhotoBase64 : 'https://ui-avatars.com/api/?name=' + session.loggedInStudent.name + '&background=random'}" 
                 class="rounded-circle shadow-sm mb-2" width="80" height="80" style="object-fit:cover;">
            <h6 class="fw-bold mb-0" th:text="${session.loggedInStudent.name}">Student Name</h6>
            <small class="text-muted" th:text="${session.loggedInStudent.batch}">Batch Name</small>
        </div>
        <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link" th:classappend="${activeMenu == 'dashboard'} ? 'active'" href="/student/dashboard"><i class="bi bi-grid me-2"></i> Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" th:classappend="${activeMenu == 'profile'} ? 'active'" href="/student/profile"><i class="bi bi-person me-2"></i> My Profile</a></li>
            <li class="nav-item"><a class="nav-link" th:classappend="${activeMenu == 'payments'} ? 'active'" href="/student/payments"><i class="bi bi-receipt me-2"></i> Fees & Payments</a></li>
            <li class="nav-item"><a class="nav-link" th:classappend="${activeMenu == 'online-courses'} ? 'active'" href="/student/online-courses"><i class="bi bi-play-circle me-2"></i> Online Courses</a></li>
            <hr>
            <li class="nav-item"><a class="nav-link text-danger" href="/student/logout"><i class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
        </ul>
    </nav>
    
    <nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background: linear-gradient(135deg, #4F46E5 0%, #0ea5e9 100%);">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/student/dashboard"><i class="bi bi-rocket-takeoff-fill me-2"></i>EduTrack Student Portal</a>
            <div class="ms-auto text-white d-flex align-items-center">
                <a href="/" class="btn btn-sm btn-outline-light me-3">Back to Main Site</a>
            </div>
        </div>
    </nav>
</body>
</html>
