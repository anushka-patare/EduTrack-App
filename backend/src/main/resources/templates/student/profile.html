<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EduTrack | My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body style="background-color: #f8fafc;">

    <div th:replace="~{student/fragments :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{student/fragments :: sidebar(activeMenu='profile')}"></div>

            <main class="col-md-10 py-4 px-4">
                <h1 class="h3 fw-bold mb-4">My Profile</h1>

                <div th:if="${param.success}" class="alert alert-success">Profile updated successfully!</div>

                <div class="row g-4">
                    <div class="col-lg-4">
                        <div class="card border-0 shadow-sm rounded-4 p-4 text-center">
                            <img th:src="${student.profilePhotoBase64 != null ? student.profilePhotoBase64 : 'https://ui-avatars.com/api/?name=' + student.name + '&background=random'}" 
                                 class="rounded-circle mx-auto mb-3" width="120" height="120" style="object-fit:cover;">
                            <h4 class="fw-bold mb-1" th:text="${student.name}">Name</h4>
                            <p class="text-muted mb-3" th:text="${student.email}">Email</p>
                            <span class="badge bg-primary bg-opacity-10 text-primary py-2 px-3 rounded-pill" th:text="${student.batch}">Batch</span>
                            
                            <hr class="my-4">
                            
                            <div class="text-start">
                                <p class="mb-2"><small class="text-muted fw-bold">JOINED DATE</small><br><span th:text="${student.joiningDate}">Date</span></p>
                                <p class="mb-2"><small class="text-muted fw-bold">GENDER</small><br><span th:text="${student.gender}">Gender</span></p>
                                <p class="mb-0"><small class="text-muted fw-bold">STATUS</small><br>
                                    <span class="badge" th:classappend="${student.isApproved ? 'bg-success' : 'bg-warning text-dark'}" th:text="${student.isApproved ? 'Approved' : 'Pending'}"></span>
                                </p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-lg-8">
                        <div class="card border-0 shadow-sm rounded-4 p-4">
                            <h5 class="fw-bold mb-4">Edit Profile</h5>
                            <form th:action="@{/student/profile/update}" method="post" enctype="multipart/form-data">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label text-muted small fw-bold">Mobile Number</label>
                                        <input type="text" name="mobile" class="form-control" th:value="${student.mobile}" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label text-muted small fw-bold">Update Password (Optional)</label>
                                        <input type="password" name="password" class="form-control" placeholder="Enter new password">
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label text-muted small fw-bold">Full Address</label>
                                        <textarea name="address" class="form-control" rows="3" th:text="${student.address}"></textarea>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label text-muted small fw-bold">Profile Photo (Max 5MB)</label>
                                        <input type="file" name="photo" class="form-control" accept="image/*">
                                    </div>
                                    <div class="col-12 mt-4 text-end">
                                        <button type="submit" class="btn btn-primary px-4 py-2 fw-bold" style="background:#4F46E5; border:none; border-radius: 10px;">Save Changes</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
