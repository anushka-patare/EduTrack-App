<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EduTrack | Courses & Materials</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body style="background-color: #f0f2f5;">

    <div th:replace="~{admin/fragments :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{admin/fragments :: sidebar(activeMenu='materials')}"></div>

            <main class="col-md-10 py-4 px-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="h3 fw-bold mb-0 text-dark">Courses & Study Materials</h1>
                    <button class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#addMaterialModal">
                        <i class="bi bi-file-earmark-plus me-2"></i>Add New Material
                    </button>
                </div>

                <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                    <tr>
                                        <th class="ps-4">Title</th>
                                        <th>Target Batch</th>
                                        <th>File/Link</th>
                                        <th class="text-center">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="m : ${materials}">
                                        <td class="ps-4">
                                            <div class="fw-bold text-dark" th:text="${m.title}">Title</div>
                                            <small class="text-muted" th:text="${m.description}">Desc</small>
                                        </td>
                                        <td>
                                            <span class="badge bg-indigo-subtle text-primary border border-primary-subtle rounded-pill px-3" th:text="${m.batchName}">Batch</span>
                                        </td>
                                        <td>
                                            <a th:href="${m.fileUrl}" target="_blank" class="btn btn-sm btn-light rounded-pill px-3">
                                                <i class="bi bi-box-arrow-up-right me-1"></i>View Material
                                            </a>
                                        </td>
                                        <td class="text-center">
                                            <a class="btn btn-sm btn-outline-danger border-0" th:href="@{/admin/material/delete/{id}(id=${m.id})}" onclick="return confirm('Delete this material?')">
                                                <i class="bi bi-trash"></i>
                                            </a>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(materials)}">
                                        <td colspan="4" class="text-center py-5 text-muted">No materials added yet.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Add Material Modal -->
                <div class="modal fade" id="addMaterialModal" tabindex="-1">
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content border-0 rounded-4 shadow">
                            <div class="modal-header border-0 pb-0">
                                <h5 class="fw-bold">Add Study Material</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <form th:action="@{/admin/material/add}" method="post" th:object="${newMaterial}">
                                <div class="modal-body">
                                    <div class="mb-3">
                                        <label class="form-label small fw-bold">Material Title</label>
                                        <input type="text" th:field="*{title}" class="form-control" placeholder="e.g. Java Basics PDF" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label small fw-bold">Description</label>
                                        <textarea th:field="*{description}" class="form-control" rows="2" placeholder="Brief description..."></textarea>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label small fw-bold">Target Batch</label>
                                        <select th:field="*{batchName}" class="form-select" required>
                                            <option value="ALL">All Batches</option>
                                            <option th:each="b : ${batches}" th:value="${b.name}" th:text="${b.name}"></option>
                                        </select>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label small fw-bold">Material Link (URL)</label>
                                        <input type="url" th:field="*{fileUrl}" class="form-control" placeholder="https://drive.google.com/..." required>
                                    </div>
                                </div>
                                <div class="modal-footer border-0">
                                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                                    <button type="submit" class="btn btn-primary rounded-pill px-4">Upload Material</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
