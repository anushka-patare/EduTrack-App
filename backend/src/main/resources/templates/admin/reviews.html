<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EduTrack | Manage Reviews</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body style="background-color: #f0f2f5;">

    <div th:replace="~{admin/fragments :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{admin/fragments :: sidebar(activeMenu='reviews')}"></div>

            <main class="col-md-10 py-4 px-4">
                <h1 class="h3 fw-bold mb-4">Manage Reviews</h1>

                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                    <tr>
                                        <th class="ps-4">Student</th>
                                        <th>Rating</th>
                                        <th>Message</th>
                                        <th>Status</th>
                                        <th class="pe-4 text-end">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="r : ${reviews}">
                                        <td class="ps-4">
                                            <span class="fw-medium d-block" th:text="${r.studentName}">Name</span>
                                            <small class="text-muted" th:text="${r.course}">Course</small>
                                        </td>
                                        <td>
                                            <span class="text-warning">
                                                <i class="bi bi-star-fill" th:each="i : ${#numbers.sequence(1, r.rating)}"></i>
                                            </span>
                                        </td>
                                        <td><div style="max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" th:text="${r.message}"></div></td>
                                        <td>
                                            <span class="badge" th:classappend="${r.status == 'APPROVED' ? 'bg-success' : (r.status == 'REJECTED' ? 'bg-danger' : 'bg-warning text-dark')}" th:text="${r.status}"></span>
                                        </td>
                                        <td class="pe-4 text-end">
                                            <div class="dropdown">
                                                <button class="btn btn-sm btn-outline-primary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                                                    Change Status
                                                </button>
                                                <ul class="dropdown-menu">
                                                    <li><a class="dropdown-item" th:href="@{/admin/review/status/{id}/APPROVED(id=${r.id})}">Approve</a></li>
                                                    <li><a class="dropdown-item" th:href="@{/admin/review/status/{id}/REJECTED(id=${r.id})}">Reject</a></li>
                                                    <li><a class="dropdown-item" th:href="@{/admin/review/status/{id}/PENDING(id=${r.id})}">Pending</a></li>
                                                </ul>
                                            </div>
                                            <a th:href="@{/admin/review/delete/{id}(id=${r.id})}" class="btn btn-sm btn-outline-danger ms-2" onclick="return confirm('Are you sure?')"><i class="bi bi-trash"></i></a>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(reviews)}">
                                        <td colspan="5" class="text-center py-5 text-muted">No reviews found.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
