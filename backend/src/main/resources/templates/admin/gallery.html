<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EduTrack | Manage Gallery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body style="background-color: #f0f2f5;">

    <div th:replace="~{admin/fragments :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{admin/fragments :: sidebar(activeMenu='gallery')}"></div>

            <main class="col-md-10 py-4 px-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="h3 fw-bold">Manage Gallery</h1>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addImageModal">
                        <i class="bi bi-cloud-upload me-2"></i>Upload Image
                    </button>
                </div>

                <div class="row g-4">
                    <div th:each="img : ${images}" class="col-md-3">
                        <div class="card shadow-sm border-0 rounded-3 h-100 overflow-hidden" th:classappend="${img.isHidden} ? 'opacity-50'">
                            <img th:src="${img.imageBase64}" class="card-img-top" alt="Gallery Image" style="height: 200px; object-fit: cover;">
                            <div class="card-body">
                                <h6 class="card-title text-truncate" th:text="${img.title}">Image Title</h6>
                                <div class="d-flex justify-content-between mt-3">
                                    <a th:href="@{/admin/gallery/toggle/{id}(id=${img.id})}" class="btn btn-sm btn-outline-secondary" th:text="${img.isHidden ? 'Show' : 'Hide'}"></a>
                                    <a th:href="@{/admin/gallery/delete/{id}(id=${img.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Are you sure?')"><i class="bi bi-trash"></i></a>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div th:if="${#lists.isEmpty(images)}" class="col-12 text-center py-5 text-muted">
                        No images in gallery yet.
                    </div>
                </div>

                <!-- Upload Image Modal -->
                <div class="modal fade" id="addImageModal" tabindex="-1">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">Upload New Image</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <form action="/admin/gallery/add" method="post" enctype="multipart/form-data">
                                <div class="modal-body">
                                    <div class="mb-3">
                                        <label class="form-label">Image Title/Caption</label>
                                        <input type="text" name="title" class="form-control" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Select Image</label>
                                        <input type="file" name="imageFile" class="form-control" accept="image/*" required>
                                    </div>
                                </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                    <button type="submit" class="btn btn-primary">Upload</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
