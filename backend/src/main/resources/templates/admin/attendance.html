<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EduTrack | Attendance Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body style="background-color: #f0f2f5;">

    <div th:replace="~{admin/fragments :: navbar}"></div>

    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{admin/fragments :: sidebar(activeMenu='attendance')}"></div>

            <main class="col-md-10 py-4 px-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="h3 fw-bold mb-0 text-dark">Attendance Tracking</h1>
                    <button class="btn btn-success shadow-sm" data-bs-toggle="modal" data-bs-target="#addAttendanceModal">
                        <i class="bi bi-calendar-plus me-2"></i>Mark Attendance
                    </button>
                </div>

                <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                    <tr>
                                        <th class="ps-4">Date</th>
                                        <th>Student</th>
                                        <th>Status</th>
                                        <th class="text-center">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="a : ${attendanceList}">
                                        <td class="ps-4 text-dark fw-medium" th:text="${a.date}">Date</td>
                                        <td th:text="${a.studentId}">Student ID</td>
                                        <td>
                                            <span class="badge rounded-pill px-3" 
                                                  th:classappend="${a.status == 'Present' ? 'bg-success' : 'bg-danger'}" 
                                                  th:text="${a.status}">Status</span>
                                        </td>
                                        <td class="text-center">
                                            <a class="btn btn-sm btn-outline-danger border-0" th:href="@{/admin/attendance/delete/{id}(id=${a.id})}" onclick="return confirm('Delete this record?')">
                                                <i class="bi bi-trash"></i>
                                            </a>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(attendanceList)}">
                                        <td colspan="4" class="text-center py-5 text-muted">No attendance records found.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Mark Attendance Modal -->
                <div class="modal fade" id="addAttendanceModal" tabindex="-1">
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content border-0 rounded-4 shadow">
                            <div class="modal-header border-0 pb-0">
                                <h5 class="fw-bold">Mark Attendance</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <form th:action="@{/admin/attendance/add}" method="post" th:object="${newAttendance}">
                                <div class="modal-body">
                                    <div class="mb-3">
                                        <label class="form-label small fw-bold">Date</label>
                                        <input type="date" th:field="*{date}" class="form-control" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label small fw-bold">Student</label>
                                        <select th:field="*{studentId}" class="form-select" required>
                                            <option value="" selected disabled>Select Student</option>
                                            <option th:each="s : ${students}" th:value="${s.id}" th:text="${s.name + ' (' + s.email + ')'}"></option>
                                        </select>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label small fw-bold">Attendance Status</label>
                                        <div class="d-flex gap-3">
                                            <div class="form-check">
                                                <input class="form-check-input" type="radio" name="status" id="present" value="Present" checked th:field="*{status}">
                                                <label class="form-check-label text-success fw-bold" for="present">Present</label>
                                            </div>
                                            <div class="form-check">
                                                <input class="form-check-input" type="radio" name="status" id="absent" value="Absent" th:field="*{status}">
                                                <label class="form-check-label text-danger fw-bold" for="absent">Absent</label>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="modal-footer border-0">
                                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                                    <button type="submit" class="btn btn-success rounded-pill px-4">Submit Attendance</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
