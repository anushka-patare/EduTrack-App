services:
  - type: web
    name: edutrack
    runtime: docker
    plan: free
    region: singapore
    envVars:
      - key: PORT
        value: 8080
      - key: MONGODB_URI
        sync: false # Set this in the Render dashboard manually for security
      - key: SPRING_PROFILES_ACTIVE
        value: prod
    healthCheckPath: /
